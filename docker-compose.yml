services:
  n8n:
    build: .
    image: n8n-async-api-dev
    ports:
      - "5678:5678"
    environment:
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_CUSTOM_EXTENSIONS=/opt/custom-nodes
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_ENABLED=true
      # L'API async-api tourne sur l'hôte (ex. :8099) ; la credential pointe dessus via :
      #   baseUrl = http://host.docker.internal:8099
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
